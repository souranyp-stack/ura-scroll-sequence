<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scroll Video — Nature's Beauty</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Jost:wght@300;500&display=swap" rel="stylesheet" />
<style>
  :root{--coral:#e86a5a;--cream:#fff8f4}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a0f0d;color:var(--cream);font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased}
  .sequence{height:400vh;position:relative}
  .sticky{position:sticky;top:0;height:100vh;width:100%;overflow:hidden}
  #vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .overlay{position:absolute;left:0;bottom:12vh;width:100%;display:flex;flex-direction:column;
    align-items:center;text-align:center;text-shadow:0 2px 30px rgba(0,0,0,.5);pointer-events:none}
  .overlay .eyebrow{text-transform:uppercase;letter-spacing:.32em;font-size:.72rem;font-weight:500;color:#ffd4c6;margin-bottom:14px}
  .overlay h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.6rem,7vw,5.5rem);line-height:1;color:#fffaf7}
  .overlay p{margin-top:14px;font-weight:300;letter-spacing:.04em;color:#fbeae3;opacity:.85}
  .loader{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:180px;height:2px;
    background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;transition:opacity .5s}
  .loader span{display:block;height:100%;width:0;background:var(--coral);transition:width .25s}
  .loader.done{opacity:0}
</style>
</head>
<body>
  <section class="sequence" id="sequence">
    <div class="sticky">
      <video id="vid" muted playsinline preload="auto" disablepictureinpicture></video>
      <div class="overlay">
        <span class="eyebrow">Nature's Beauty</span>
        <h1>Watch it bloom</h1>
        <p>Scroll to play</p>
      </div>
      <div class="loader" id="loader"><span></span></div>
    </div>
  </section>
<script>
const VIDEO_URL = "hero-scrub.mp4";   /* same-repo relative path (works on Vercel/GitHub Pages) */
const vid=document.getElementById('vid'), track=document.getElementById('sequence'),
      loader=document.getElementById('loader'), bar=loader.querySelector('span');
vid.src=VIDEO_URL; let ready=false, target=0;
vid.addEventListener('loadedmetadata',()=>{try{vid.currentTime=0.001;}catch(e){}});
vid.addEventListener('canplaythrough',()=>{ready=true;bar.style.width='100%';loader.classList.add('done');onScroll();});
vid.addEventListener('progress',()=>{if(vid.buffered.length&&vid.duration)bar.style.width=(vid.buffered.end(vid.buffered.length-1)/vid.duration*100)+'%';});
function onScroll(){if(!ready||!vid.duration)return;const r=track.getBoundingClientRect();const t=track.offsetHeight-innerHeight;const p=Math.min(1,Math.max(0,-r.top/t));target=p*(vid.duration-0.05);}
function tick(){if(ready&&Math.abs(vid.currentTime-target)>0.01)vid.currentTime+=(target-vid.currentTime)*0.25;requestAnimationFrame(tick);}
addEventListener('scroll',onScroll,{passive:true});addEventListener('resize',onScroll,{passive:true});requestAnimationFrame(tick);
</script>
</body>
</html>
